<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcomIQ Dashboard</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-950 text-white font-sans">

  <!-- Header -->
  <header class="p-4 border-b border-slate-800 flex justify-between">
    <h1 class="text-xl font-bold">EcomIQ Dashboard</h1>
    <span class="text-sm text-slate-400">Analytics System</span>
  </header>

  <main class="p-6 space-y-8">

    <!-- Title -->
    <div>
        <h1 class="text-2xl font-bold text-white">Customer Intelligence</h1>
        <p class="text-slate-400 text-sm">AI-driven insights for your store</p>
    </div>

    <!-- KPI Grid -->
    <div id="kpi-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

    <!-- Charts Section -->
    <div class="grid lg:grid-cols-3 gap-6">

        <!-- Revenue -->
        <div class="lg:col-span-2 bg-slate-900 p-6 rounded-2xl border border-slate-800">
            
            <!-- 🔥 UPDATED HEADER WITH BUTTONS -->
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-white font-semibold">Revenue Forecast</h2>

                <div class="flex gap-2">
                    <button onclick="updateTrend('7D')" 
                        class="px-3 py-1 text-xs bg-slate-800 text-white rounded hover:bg-slate-700">
                        7D
                    </button>

                    <button onclick="updateTrend('30D')" 
                        class="px-3 py-1 text-xs bg-slate-700 text-white rounded">
                        30D
                    </button>

                    <button onclick="updateTrend('YTD')" 
                        class="px-3 py-1 text-xs bg-slate-800 text-white rounded hover:bg-slate-700">
                        YTD
                    </button>
                </div>
            </div>

            <!-- Chart -->
            <canvas id="revenueChart"></canvas>
        </div>

        <!-- Segments -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-white font-semibold mb-4">Audience Segments</h2>
            <div class="flex justify-between items-center mb-4">
    <h2 class="text-white font-semibold">Revenue Forecast</h2>

    <div class="flex gap-2">
        <button onclick="updateTrend('7D')" 
            class="btn-glow px-3 py-1 text-xs bg-slate-700 text-white rounded">
            7D
        </button>

        <button onclick="updateTrend('30D')" 
            class="btn-glow px-3 py-1 text-xs bg-slate-700 text-white rounded">
            30D
        </button>

        <button onclick="updateTrend('YTD')" 
            class="btn-glow px-3 py-1 text-xs bg-slate-800 text-white rounded">
            YTD
        </button>
    </div>
</div>
            <canvas id="segmentsChart"></canvas>
        </div>

    </div>

    <!-- Bottom Section -->
    <div class="grid lg:grid-cols-2 gap-6">

        <!-- Insights -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-white font-semibold mb-4">Insights</h2>
            <div id="insights-container" class="space-y-3"></div>
        </div>

        <!-- Top Products -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-white font-semibold mb-4">Top Products</h2>
            <div id="top-products-container" class="space-y-3"></div>
        </div>

    </div>

</main>

  <!-- JS -->
  <script src="/js/app.js"></script>

</body>
</html>
